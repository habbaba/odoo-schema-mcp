services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - 3000:8080
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - ENABLE_API_KEY=True
      - WEBUI_AUTH=True
      - WEBUI_SECRET_KEY=yoursecretkeyhere
    volumes:
      - open-webui_data:/app/backend/data
    depends_on:
      - ollama

  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    volumes:
      - pipelines:/app/pipelines
    restart: always
    environment:
      - PIPELINES_API_KEY=0p3n-w3bu!

  odoo-mcp:
    image: ghcr.io/habbaba/odoo-schema-mcp:latest
    build:
      context: ./odoo-schema-mcp        # folder created by: git clone https://github.com/habbaba/odoo-schema-mcp.git
      dockerfile: Dockerfile
    container_name: odoo-mcp
    restart: unless-stopped
    ports:
      - "8000:8000"                     # needed so Claude Code on your Mac can reach it
    environment:

      # ── Neo4j connection ──────────────────────────────────────────────────
      NEO4J_URI: bolt://YOUR_NEO4J_HOST:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: YOUR_NEO4J_PASSWORD
      NEO4J_DATABASE: neo4j

      # ── Tenant label (must match the label set in Odoo Neo4j Connector) ──
      TENANT_LABEL: Development

      # ── Ollama is in the same stack — use its service name ────────────────
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL: nomic-embed-text

      # ── Bearer token — protects the MCP endpoint ─────────────────────────
      # Generate one with:  openssl rand -hex 32
      MCP_API_TOKEN: YOUR_SECRET_TOKEN

      # ── Internal — do not change ──────────────────────────────────────────
      MCP_TRANSPORT: sse
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      - ollama

volumes:
  ollama_data:
  open-webui_data:
  pipelines:
