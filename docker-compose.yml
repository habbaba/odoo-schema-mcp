services:

  odoo-mcp:
    image: ghcr.io/habbaba/odoo-schema-mcp:latest   # or use 'build: .' to build locally
    build: .
    container_name: odoo-mcp
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:

      # ── Neo4j connection ──────────────────────────────────────────────────
      NEO4J_URI: bolt://YOUR_NEO4J_HOST:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: YOUR_NEO4J_PASSWORD
      NEO4J_DATABASE: neo4j

      # ── Tenant label (must match the label set in Odoo Neo4j Connector) ──
      TENANT_LABEL: Development

      # ── Ollama — for semantic vector search (optional) ───────────────────
      # If Ollama runs in the same docker-compose stack use its service name:
      OLLAMA_URL: http://ollama:11434
      # If Ollama runs on the host machine use:
      # OLLAMA_URL: http://host.docker.internal:11434
      EMBED_MODEL: nomic-embed-text

      # ── Bearer token — protects the MCP endpoint ─────────────────────────
      # Generate one with:  openssl rand -hex 32
      # Leave empty to disable auth (not recommended on a public server)
      MCP_API_TOKEN: YOUR_SECRET_TOKEN

      # ── Internal transport settings — do not change ───────────────────────
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    networks:
      - webui-net

networks:
  webui-net:
    external: true
    # ↑ Use this if Open WebUI already created this network.
    # To find your Open WebUI network name run:  docker network ls
    # Then replace "webui-net" above with the correct name.
