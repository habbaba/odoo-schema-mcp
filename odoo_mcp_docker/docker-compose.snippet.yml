# ─────────────────────────────────────────────────────────────────────────────
# Add this service to your existing Open WebUI docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
#
# STEP 1 — Copy this snippet into your docker-compose.yml services block.
# STEP 2 — Make sure "odoo-mcp" is on the same network as open-webui
#           (add it to your existing network, or use the one below).
# STEP 3 — Copy .env.example → .env and fill in your values.
# STEP 4 — docker compose up -d odoo-mcp
# STEP 5 — In Open WebUI: Admin → Settings → Tools → Add Tool Server
#             Type : MCP
#             URL  : http://odoo-mcp:8000/mcp
#             Auth : Bearer  <value of MCP_API_TOKEN>
#
# From Claude Code (.mcp.json on your Mac) use:
#   "url": "http://YOUR_SERVER_IP:8000/mcp"
# ─────────────────────────────────────────────────────────────────────────────

services:

  odoo-mcp:
    build:
      context: ./odoo_mcp_docker        # path to the folder containing Dockerfile
      dockerfile: Dockerfile
    container_name: odoo-mcp
    restart: unless-stopped
    env_file:
      - ./odoo_mcp_docker/.env          # copy .env.example → .env and fill in
    ports:
      - "8000:8000"                     # exposes to host for Claude Code on your Mac
                                        # remove this line if Claude Code also runs in Docker
    networks:
      - webui-net                       # replace with your actual network name
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

# ─────────────────────────────────────────────────────────────────────────────
# If you don't already have a network, add this at the bottom of your
# docker-compose.yml (outside the services block):
# ─────────────────────────────────────────────────────────────────────────────

networks:
  webui-net:
    external: true     # use this if the network was created by another compose file
    # driver: bridge   # use this instead if you want compose to create it
